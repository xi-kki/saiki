<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saiki — Wisdom for the Curious</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --font-sans: 'Inter', system-ui, sans-serif;
      --font-serif: 'Playfair Display', Georgia, serif;
      --bg: #0a0a0f;
      --gold: #c9a84c;
      --gold-hover: #d4af37;
    }
    ::selection { background: var(--gold); color: var(--bg); }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body { font-family: var(--font-sans); background: var(--bg); color: white; overflow-x: hidden; min-height: 100vh; }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .animate-blink { animation: blink 1s step-end infinite; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.8s cubic-bezier(0.25, 0.1, 0.25, 1) forwards; opacity: 0; }
    .fade-in-d1 { animation: fadeIn 0.6s ease-out 0.15s forwards; opacity: 0; }
    .fade-in-d2 { animation: fadeIn 0.6s ease-out 0.3s forwards; opacity: 0; }

    /* Navbar */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 20;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 1.25rem;
    }
    @media (min-width: 640px) { .navbar { padding: 1.25rem 2rem; } }

    .logo { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
    .logo-text { font-size: 21px; letter-spacing: -0.02em; color: white; font-weight: 500; user-select: none; }
    @media (min-width: 640px) { .logo-text { font-size: 26px; } }
    .nav-links { display: none; align-items: center; gap: 8px; font-size: 15px; color: rgba(255,255,255,0.7); }
    @media (min-width: 768px) { .nav-links { display: flex; } }
    .nav-links a { color: inherit; text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: white; }
    .nav-links .dot { opacity: 0.3; }

    .nav-cta { display: none; align-items: center; gap: 6px; font-size: 15px; color: white; text-decoration: none; transition: color 0.2s; }
    @media (min-width: 768px) { .nav-cta { display: flex; } }
    .nav-cta:hover { color: var(--gold); }

    .hamburger { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 40px; height: 40px; gap: 5px; background: none; border: none; cursor: pointer; }
    @media (min-width: 768px) { .hamburger { display: none; } }
    .hamburger span { display: block; width: 24px; height: 2px; background: white; transition: all 0.3s; }
    .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(7px, 7px); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(7px, -7px); }

    .mobile-menu {
      position: fixed; inset: 0; z-index: 19;
      background: rgba(10,10,15,0.98); backdrop-filter: blur(20px);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2rem;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .mobile-menu.open { opacity: 1; pointer-events: auto; }
    .mobile-menu a { font-size: 24px; color: white; text-decoration: none; transition: color 0.2s; }
    .mobile-menu a:hover { color: var(--gold); }
    .mobile-menu .close { position: absolute; top: 1.25rem; right: 1.25rem; background: none; border: none; color: white; cursor: pointer; }

    /* Video */
    .video-container { position: absolute; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
    .video-container video { width: 100%; height: 100%; object-fit: cover; object-position: 50% 20%; }
    .video-overlay { position: absolute; inset: 0; background: linear-gradient(to right, var(--bg), rgba(10,10,15,0.6), transparent); }

    /* Hero */
    .hero {
      position: relative; z-index: 10;
      width: 100%; max-width: 80rem; margin: 0 auto;
      padding: 8rem 1.5rem 4rem;
      display: flex; flex-direction: column; justify-content: center;
      min-height: 100vh;
    }

    .headline {
      font-family: var(--font-serif);
      font-size: 48px; font-weight: 400; letter-spacing: -0.03em;
      line-height: 1.05; margin-bottom: 1.5rem; white-space: pre-wrap;
    }
    @media (min-width: 768px) { .headline { font-size: 64px; } }
    @media (min-width: 1024px) { .headline { font-size: 80px; } }

    .cursor-blink {
      display: inline-block; width: 2px; height: 0.9em;
      background: var(--gold); vertical-align: middle; margin-left: 4px;
    }

    .subtitle {
      font-size: 15px; color: rgba(255,255,255,0.4); line-height: 1.6;
      margin-bottom: 2.5rem; max-width: 400px;
    }
    @media (min-width: 768px) { .subtitle { font-size: 17px; } }

    .cta {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; background: var(--gold); color: var(--bg);
      border-radius: 9999px; font-size: 14px; font-weight: 500;
      text-decoration: none; transition: all 0.2s; border: none; cursor: pointer;
      width: fit-content;
    }
    .cta:hover { background: var(--gold-hover); box-shadow: 0 0 30px rgba(201,168,76,0.3); }
  </style>
</head>
<body>
  <header class="navbar">
    <a href="#" class="logo">
      <span class="logo-text">Saiki&reg;</span>
    </a>
    <nav class="nav-links">
      <a href="#">Explore</a><span class="dot">·</span>
      <a href="#">Saved</a><span class="dot">·</span>
      <a href="#">Profile</a><span class="dot">·</span>
      <a href="#">Today</a>
    </nav>
    <a href="#" class="nav-cta">
      Start Thinking
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>
    <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <div class="mobile-menu" id="mobileMenu">
    <button class="close" onclick="toggleMenu()" aria-label="Close">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <a href="#">Explore</a>
    <a href="#">Saved</a>
    <a href="#">Profile</a>
    <a href="#">Today</a>
    <a href="#" style="margin-top:1rem;padding:14px 28px;background:var(--gold);color:var(--bg);border-radius:9999px;font-size:16px;font-weight:500;">Start Thinking</a>
  </div>

  <div class="video-container">
    <video muted playsinline preload="auto" id="bgVideo">
      <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260601_110537_3a579fa0-7bbc-4d94-9d25-0e816c7840f5.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
  </div>

  <main class="hero">
    <h1 class="headline fade-in" id="headline"></h1>
    <p class="subtitle fade-in-d1">Choose your diet. Philosophy, psychology, and more — delivered daily.</p>
    <a href="#" class="cta fade-in-d2">
      Start Thinking
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>
  </main>

  <script>
    // Typewriter
    const text = "Feed your mind.";
    const headline = document.getElementById('headline');
    let i = 0;
    setTimeout(() => {
      const iv = setInterval(() => {
        if (i < text.length) { headline.textContent = text.slice(0, i + 1); i++; }
        else clearInterval(iv);
      }, 38);
    }, 600);

    // Video scrubbing (throttled + adaptive lerp)
    const video = document.getElementById('bgVideo');
    let targetTime = 0, lastSeek = 0;
    if (window.innerWidth >= 1024) {
      document.addEventListener('mousemove', e => {
        const dur = video.duration || 0;
        if (dur) targetTime = (e.clientX / window.innerWidth) * dur;
      });
      (function loop() {
        const now = performance.now();
        const cur = video.currentTime;
        const diff = targetTime - cur;
        if (Math.abs(diff) > 0.02 && now - lastSeek > 16) {
          const speed = Math.abs(diff) > 1 ? 0.2 : 0.12;
          video.currentTime = cur + diff * speed;
          lastSeek = now;
        }
        requestAnimationFrame(loop);
      })();
    }
    if (window.innerWidth < 1024) { video.autoplay = true; video.play().catch(() => {}); }

    // Mobile menu
    function toggleMenu() {
      document.getElementById('mobileMenu').classList.toggle('open');
      document.querySelector('.hamburger').classList.toggle('active');
    }
  </script>
</body>
</html>
